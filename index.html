<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еҫ№еӯҗAI е®Ңе…ЁзүҲ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#222;}
.tabbar button{flex:1;padding:12px;border:none;background:#222;color:#fff;}
.screen{display:none;padding:10px;padding-bottom:70px;}
.card{background:#222;padding:12px;border-radius:10px;margin:8px 0;}
textarea,input,select{width:100%;border-radius:8px;margin-top:5px;font-size:16px;}
#input{height:160px;}
.warn{background:#b71c1c;padding:10px;border-radius:10px;margin-top:10px;}
.safe{background:#1b5e20;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<!-- рҹ”Ҙ гғӣгғјгғ  -->
<div id="home" class="screen" style="display:block">
<div class="card" style="text-align:center">
<h2>еҫ№еӯҗAI</h2>
<div style="opacity:0.7">гҒӮгҒӘгҒҹгҒ®гғҡгғјгӮ№гҒ§еӨ§дёҲеӨ«</div>
</div>

<div class="card">
<button onclick="go('consult')">зӣёи«ҮгҒё</button>
<button onclick="go('coach')">дјҙиө°гҒё</button>
<button onclick="go('diary')">ж—ҘиЁҳгҒё</button>
</div>
</div>

<!-- рҹ”Ҙ зӣёи«Ү -->
<div id="consult" class="screen">
<div class="card">

<select id="target">
<option>зҲ¶</option><option>жҜҚ</option><option>й…ҚеҒ¶иҖ…</option><option>еӯҗгҒ©гӮӮ</option>
</select>

<input type="file" accept="image/*" onchange="loadImage(event)">
<textarea id="input"></textarea>

<button onclick="analyze()">ж•ҙзҗҶ</button>
<button onclick="check()">гғҒгӮ§гғғгӮҜ</button>
<button id="replyBtn" onclick="reply()">иҝ”дҝЎ</button>

<div>жӮӘеҢ–гӮ№гӮігӮў:<span id="scoreValue">-</span></div>
<div style="height:10px;background:#333">
<div id="scoreBar" style="height:10px;width:0%"></div>
</div>

<div id="prediction"></div>
<div id="warn"></div>
<div id="result"></div>

</div>
</div>

<!-- рҹ”Ҙ дјҙиө° -->
<div id="coach" class="screen">

<div class="card">
<h3>д»ҠгҒ©гҒҶгҒҷгӮӢпјҹ</h3>
<button onclick="coach('ж•ҙзҗҶ')">ж°—жҢҒгҒЎж•ҙзҗҶ</button>
<button onclick="coach('йҖҒгӮӢгҒ№гҒҚгҒӢ')">йҖҒгӮӢгҒ№гҒҚпјҹ</button>
<button onclick="coach('и·қйӣў')">и·қйӣўгӮ’еҸ–гӮӢ</button>
<button onclick="coach('иЎҢеӢ•')">иЎҢеӢ•гҒ—гҒҹгҒ„</button>
</div>

<div class="card">
<h3>жңӘжқҘдәҲжё¬</h3>
<button onclick="future()">гҒ“гҒ®гҒҫгҒҫгҒ гҒЁпјҹ</button>
<div id="futureResult"></div>
</div>

<div class="card">
<div id="coachResult"></div>
</div>

</div>

<!-- рҹ”Ҙ ж—ҘиЁҳ -->
<div id="diary" class="screen">

<div class="card">
<select id="mood">
<option value="2">рҹҳҠ</option>
<option value="1">рҹҳҗ</option>
<option value="0">рҹҳў</option>
</select>

<textarea id="diaryText"></textarea>
<button onclick="saveDiary()">дҝқеӯҳ</button>
</div>

<div class="card">
<button onclick="review('day')">ж—Ҙ</button>
<button onclick="review('week')">йҖұ</button>
<button onclick="review('month')">жңҲ</button>
<button onclick="review('year')">е№ҙ</button>
</div>

<div id="reviewResult" class="card"></div>

<div id="diaryList"></div>

<canvas id="chart"></canvas>

</div>

<!-- рҹ”Ҙ иЁӯе®ҡ -->
<div id="settings" class="screen">
<div class="card">
<input id="key" type="password">
<button onclick="saveKey()">дҝқеӯҳ</button>
</div>
</div>

<div class="tabbar">
<button onclick="go('home')">гғӣгғјгғ </button>
<button onclick="go('consult')">зӣёи«Ү</button>
<button onclick="go('coach')">дјҙиө°</button>
<button onclick="go('diary')">ж—ҘиЁҳ</button>
<button onclick="go('settings')">иЁӯе®ҡ</button>
</div>

<script>
let API_KEY="";let chart;

// з”»йқў
function go(id){
 document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
 document.getElementById(id).style.display="block";
}

// API
function saveKey(){
 API_KEY=key.value;
 localStorage.setItem("apiKey",API_KEY);
}

// гғӯгӮ°
function getLogs(){return JSON.parse(localStorage.getItem("logs")||"[]");}
function saveLog(type,text,mood=null){
 let logs=getLogs();
 logs.push({type,text,mood,date:Date.now()});
 logs=logs.slice(-50);
 localStorage.setItem("logs",JSON.stringify(logs));
 drawChart();
 renderDiary();
}

// OCR
async function loadImage(e){
 let r=await Tesseract.recognize(e.target.files[0],'jpn+eng');
 input.value=r.data.text;
}

// гӮ№гӮігӮў
function calcScore(t){
 let s=0;
 if(t.includes("гҒӘгӮ“гҒ§"))s+=30;
 if(t.includes("зө¶еҜҫ"))s+=30;
 if(t.includes("з„ЎзҗҶ"))s+=20;
 if(t.length>120)s+=20;
 return Math.min(s,100);
}
function showScore(s){
 scoreValue.textContent=s;
 scoreBar.style.width=s+"%";
 scoreBar.style.background=s<30?"lime":s<60?"orange":"red";
}

// AI
async function callAI(p){
 if(!API_KEY)return"APIгӮӯгғјжңӘе…ҘеҠӣ";
 let r=await fetch("https://api.openai.com/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+API_KEY
  },
  body:JSON.stringify({
   model:"gpt-4o-mini",
   messages:[{role:"user",content:p}]
  })
 });
 let d=await r.json();
 return d.choices?.[0]?.message?.content||"гӮЁгғ©гғј";
}

// зӣёи«Ү
async function analyze(){
 let t=input.value;
 let res=await callAI("ж„ҹжғ…ж•ҙзҗҶ:"+t);
 result.textContent=res;
 saveLog("зӣёи«Ү",t);
}

// гғҒгӮ§гғғгӮҜпјӢжңӘжқҘ
async function check(){
 let t=input.value;
 let s=calcScore(t);
 showScore(s);

 if(s>=60){
  warn.innerHTML="<div class='warn'>вҡ  д»ҠгҒҜйҖҒгӮүгҒӘгҒ„гҒ§гҖӮдјҙиө°гҒё</div>";
  replyBtn.disabled=true;
  return;
 }

 let pred=await callAI("зӣёжүӢгҒ®еҸҚеҝңдәҲжё¬:"+t);
 prediction.textContent=pred;

 replyBtn.disabled=false;
}

// иҝ”дҝЎ
async function reply(){
 let t=input.value;
 let res=await callAI("иҝ”дҝЎ3жЎҲ:"+t);
 result.textContent=res;
}

// дјҙиө°
async function coach(mode){
 let logs=getLogs().map(l=>l.text).join("\n");
 let res=await callAI(`
й•·жңҹдјҙиө°
${logs}

зӣ®зҡ„:${mode}

в‘ зҠ¶ж…Ӣ
в‘ЎгӮ„гӮӢгҒ“гҒЁ
в‘ўNG
в‘ЈдёҖжӯ©
`);
 coachResult.textContent=res;
}

// рҹ”Ҙ жңӘжқҘдәҲжё¬
async function future(){
 let logs=getLogs().map(l=>l.text).join("\n");
 let res=await callAI(`
жңӘжқҘдәҲжё¬
${logs}

в‘ жӮӘеҢ–гғ«гғјгғҲ
в‘Ўеӣһеҫ©гғ«гғјгғҲ
в‘ўеҲҶеІҗ
в‘Јд»ҠгӮ„гӮӢгҒ“гҒЁ
в‘ӨNG
`);
 futureResult.innerHTML=res;
}

// ж—ҘиЁҳ
function saveDiary(){
 saveLog("ж—ҘиЁҳ",diaryText.value,parseInt(mood.value));
 diaryText.value="";
 review("day");
}

// ж—ҘиЁҳдёҖиҰ§
function renderDiary(){
 let logs=getLogs().filter(l=>l.type==="ж—ҘиЁҳ");
 diaryList.innerHTML=logs.reverse().map(l=>`
 <div class="card">
 ${new Date(l.date).toLocaleString()}<br>${l.text}
 </div>`).join("");
}

// жҢҜгӮҠиҝ”гӮҠ
async function review(type){
 let now=Date.now();
 let range={day:86400000,week:86400000*7,month:86400000*30,year:86400000*365};
 let logs=getLogs().filter(l=>l.mood!==null && now-l.date<range[type]);
 let text=logs.map(l=>l.text).join("\n");
 if(!text){reviewResult.textContent="гҒӘгҒ—";return;}
 let res=await callAI(`
жҢҜгӮҠиҝ”гӮҠ
${text}
гғ»иҰҒзҙ„
гғ»ж°—жҢҒгҒЎ
гғ»иҖғгҒҲж–№
гғ»гӮўгғүгғҗгӮӨгӮ№`);
 reviewResult.textContent=res;
}

// гӮ°гғ©гғ•
function drawChart(){
 let logs=getLogs().filter(l=>l.mood!==null);
 if(chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>new Date(l.date).toLocaleDateString()),
   datasets:[{
    data:logs.map(l=>l.mood),
    segment:{
     borderColor:ctx=>{
      let v=ctx.p1.parsed.y;
      if(v==2)return"lime";
      if(v==1)return"yellow";
      return"red";
     }
    }
   }]
  }
 });
}

// еҲқжңҹ
window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 key.value=API_KEY;
 drawChart();
 renderDiary();
}
</script>

</body>
</html>
