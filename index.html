<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族関係AI 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#222;}
.tabbar button{flex:1;padding:12px;border:none;background:#222;color:#fff;}
.screen{display:none;padding:10px;padding-bottom:70px;}
.card{background:#222;padding:12px;border-radius:10px;margin:8px 0;}
textarea,input,select{width:100%;border-radius:8px;margin-top:5px;}
.warn{background:#b71c1c;padding:10px;border-radius:10px;margin-top:10px;}
.safe{background:#1b5e20;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div id="home" class="screen" style="display:block">
<div class="card">
<h3>今日なにする？</h3>
<button onclick="go('consult')">相談</button>
<button onclick="go('coach')">伴走</button>
<button onclick="go('diary')">日記</button>
</div>
</div>

<div id="consult" class="screen">
<div class="card">
<select id="target">
<option>父</option><option>母</option><option>配偶者</option>
<option>子ども</option><option>義家族</option>
</select>

<textarea id="input"></textarea>

<button onclick="analyze()">整理</button>
<button onclick="check()">チェック</button>
<button id="replyBtn" onclick="reply()">返信</button>

<div id="scoreBox" class="card">
悪化スコア：<span id="scoreValue">-</span>
<div style="height:10px;background:#333">
<div id="scoreBar" style="height:10px;width:0%"></div>
</div>
</div>

<div id="prediction" class="card"></div>

<div id="warn"></div>
<div id="result"></div>
</div>
</div>

<div id="coach" class="screen">
<div class="card">
<button onclick="coach()">伴走AI</button>
<div id="coachResult"></div>
</div>
</div>

<div id="diary" class="screen">
<div class="card">
<select id="mood">
<option value="2">😊</option>
<option value="1">😐</option>
<option value="0">😢</option>
</select>
<textarea id="diaryText"></textarea>
<button onclick="saveDiary()">保存</button>
</div>
<canvas id="chart"></canvas>
</div>

<div id="settings" class="screen">
<div class="card">
<input id="key" type="password">
<button onclick="saveKey()">保存</button>
</div>
</div>

<div class="tabbar">
<button onclick="go('home')">ホーム</button>
<button onclick="go('consult')">相談</button>
<button onclick="go('coach')">伴走</button>
<button onclick="go('diary')">日記</button>
<button onclick="go('settings')">設定</button>
</div>

<script>
let API_KEY="";
let chart;

// 画面
function go(id){
 document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
 document.getElementById(id).style.display="block";
}

// API
function saveKey(){
 API_KEY=key.value;
 localStorage.setItem("apiKey",API_KEY);
}

// ログ
function getLogs(){return JSON.parse(localStorage.getItem("logs")||"[]");}
function saveLog(type,text,mood=null){
 let logs=getLogs();
 logs.push({type,text,mood,date:Date.now()});
 localStorage.setItem("logs",JSON.stringify(logs));
 drawChart();
}

// プロファイル
function getProfiles(){return JSON.parse(localStorage.getItem("profiles")||"{}");}
function saveProfiles(p){localStorage.setItem("profiles",JSON.stringify(p));}

// 危険
function danger(t){return ["死","消えたい","暴力"].some(w=>t.includes(w));}

// 🔥 スコア
function calcScore(t){
 let s=0;
 if(t.length>120)s+=20;
 if(t.includes("なんで"))s+=25;
 if(t.includes("絶対"))s+=25;
 if(t.includes("無理"))s+=20;
 return Math.min(s,100);
}

// 表示
function showScore(s){
 scoreValue.textContent=s;
 scoreBar.style.width=s+"%";
 scoreBar.style.background=s<30?"lime":s<60?"orange":"red";
}

// 🔥 送信ロック
function lockSend(msg){
 replyBtn.disabled=true;
 warn.innerHTML="<div class='warn'>"+msg+"</div>";
}
function unlockSend(){
 replyBtn.disabled=false;
 warn.innerHTML="";
}

// AI
async function callAI(p){
 if(!API_KEY)return "APIキー未入力";
 let r=await fetch("https://api.openai.com/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+API_KEY
  },
  body:JSON.stringify({
   model:"gpt-4o-mini",
   messages:[
    {role:"system",content:"家族関係改善AI"},
    {role:"user",content:p}
   ]
  })
 });
 let d=await r.json();
 return d.choices?.[0]?.message?.content||"エラー";
}

// 予測
async function predict(t){
 let res=await callAI("相手の反応予測:"+t);
 prediction.textContent=res;
}

// チェック
async function check(){
 let t=input.value;

 let score=calcScore(t);
 showScore(score);

 await predict(t);

 if(score>=60){
  lockSend("⚠ 危険：送らない方がいい");
  return;
 }

 unlockSend();
 result.innerHTML="<div class='safe'>OK</div>";
}

// 返信
async function reply(){
 let t=input.value;

 if(danger(t)){
  lockSend("⚠ 危険ワード検出");
  return;
 }

 let res=await callAI("返信:"+t);
 result.textContent=res;
}

// 伴走
async function coach(){
 let logs=getLogs().map(l=>l.text).join("\n");
 let res=await callAI("長期伴走:"+logs);
 coachResult.textContent=res;
}

// 日記
function saveDiary(){
 saveLog("日記",diaryText.value,parseInt(mood.value));
 diaryText.value="";
}

// グラフ
function drawChart(){
 let logs=getLogs().filter(l=>l.mood!==null);
 if(chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>new Date(l.date).toLocaleDateString()),
   datasets:[{data:logs.map(l=>l.mood)}]
  }
 });
}

// 初期
window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 key.value=API_KEY;
 drawChart();
}
</script>

</body>
</html>
