<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>徹子AI 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#222;}
.tabbar button{flex:1;padding:12px;border:none;background:#222;color:#fff;}
.screen{display:none;padding:10px;padding-bottom:70px;}
.card{background:#222;padding:12px;border-radius:10px;margin:8px 0;}
textarea,input,select{width:100%;border-radius:8px;margin-top:5px;font-size:16px;}
#input{height:160px;}
.warn{background:#b71c1c;padding:10px;border-radius:10px;margin-top:10px;}
.safe{background:#1b5e20;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<!-- 🔥 ホーム（固定エリア） -->
<div id="home" class="screen" style="display:block">

<div id="tetukoArea">

<div class="card" style="text-align:center">
<h2>徹子AI</h2>
<div style="opacity:0.7">あなたのペースで大丈夫</div>
</div>

<div class="card">
今日の状態
<div id="todayState">未チェック</div>
</div>

<div class="card">
<button onclick="quickTalk('つらい')">😢</button>
<button onclick="quickTalk('イライラ')">😡</button>
<button onclick="quickTalk('疲れた')">😴</button>
<button onclick="quickTalk('大丈夫')">😊</button>
</div>

<div class="card">
<div id="tetukoChat"></div>
<textarea id="tetukoInput" placeholder="徹子に話す"></textarea>
<button onclick="talkTetuko()">話す</button>
</div>

</div>

<div class="card">
<button onclick="go('consult')">相談へ</button>
<button onclick="go('coach')">伴走へ</button>
<button onclick="go('diary')">日記へ</button>
</div>

</div>

<!-- 🔥 相談 -->
<div id="consult" class="screen">
<div class="card">

<select id="target">
<option>父</option><option>母</option><option>配偶者</option><option>子ども</option>
</select>

<input type="file" accept="image/*" onchange="loadImage(event)">
<textarea id="input" placeholder="出来事・LINE"></textarea>

<button onclick="analyze()">整理</button>
<button onclick="check()">チェック</button>
<button id="replyBtn" onclick="reply()">返信</button>

<div>悪化スコア:<span id="scoreValue">-</span></div>
<div style="height:10px;background:#333">
<div id="scoreBar" style="height:10px;width:0%"></div>
</div>

<div id="prediction"></div>
<div id="warn"></div>
<div id="result"></div>

</div>
</div>

<!-- 🔥 伴走 -->
<div id="coach" class="screen">

<div class="card">
<h3>今どうする？</h3>
<button onclick="coach('整理')">気持ち整理</button>
<button onclick="coach('送るべきか')">送るべき？</button>
<button onclick="coach('距離')">距離を取る</button>
<button onclick="coach('行動')">行動したい</button>
</div>

<div class="card">
<h3>未来予測</h3>
<button onclick="future()">このままだと？</button>
<div id="futureResult"></div>
</div>

<div class="card">
<div id="coachResult"></div>
</div>

</div>

<!-- 🔥 日記 -->
<div id="diary" class="screen">

<div class="card">
<select id="mood">
<option value="2">😊</option>
<option value="1">😐</option>
<option value="0">😢</option>
</select>

<textarea id="diaryText"></textarea>
<button onclick="saveDiary()">保存</button>
</div>

<div class="card">
<button onclick="review('day')">日</button>
<button onclick="review('week')">週</button>
<button onclick="review('month')">月</button>
<button onclick="review('year')">年</button>
</div>

<div id="reviewResult" class="card"></div>

<div id="diaryList"></div>

<canvas id="chart"></canvas>

</div>

<!-- 🔥 設定 -->
<div id="settings" class="screen">
<div class="card">
<input id="key" type="password">
<button onclick="saveKey()">保存</button>
</div>
</div>

<div class="tabbar">
<button onclick="go('home')">ホーム</button>
<button onclick="go('consult')">相談</button>
<button onclick="go('coach')">伴走</button>
<button onclick="go('diary')">日記</button>
<button onclick="go('settings')">設定</button>
</div>

<script>
let API_KEY="";let chart;

// 画面切替
function go(id){
 document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
 document.getElementById(id).style.display="block";
}

// API
function saveKey(){
 API_KEY=key.value;
 localStorage.setItem("apiKey",API_KEY);
}

// ログ管理
function getLogs(){return JSON.parse(localStorage.getItem("logs")||"[]");}
function saveLog(type,text,mood=null){
 let logs=getLogs();
 logs.push({type,text,mood,date:Date.now()});
 logs=logs.slice(-50);
 localStorage.setItem("logs",JSON.stringify(logs));
 drawChart();
 renderDiary();
}

// OCR
async function loadImage(e){
 let r=await Tesseract.recognize(e.target.files[0],'jpn+eng');
 input.value=r.data.text;
}

// 徹子AI
function quickTalk(t){tetukoInput.value=t;talkTetuko();}

function updateState(t){
 if(t.includes("つらい")) todayState.textContent="しんどい";
 else if(t.includes("イライラ")) todayState.textContent="ストレス高";
 else todayState.textContent="安定";
}

function isDanger(t){
 return ["死","消えたい","もう無理","限界"].some(w=>t.includes(w));
}

async function talkTetuko(){
 let t=tetukoInput.value;
 if(!t)return;

 updateState(t);

 if(isDanger(t)){
  tetukoChat.innerHTML+=`
  <div>🧑 ${t}</div>
  <div style="color:#ff8080">👵 今は無理しなくていいのよ。休みましょう。</div>`;
  return;
 }

 let res=await callAI("優しく短く:"+t);

 tetukoChat.innerHTML+=`
 <div>🧑 ${t}</div>
 <div>👵 ${res}</div>`;

 tetukoInput.value="";
}

// スコア
function calcScore(t){
 let s=0;
 if(t.includes("なんで"))s+=30;
 if(t.includes("絶対"))s+=30;
 if(t.includes("無理"))s+=20;
 if(t.length>120)s+=20;
 return Math.min(s,100);
}
function showScore(s){
 scoreValue.textContent=s;
 scoreBar.style.width=s+"%";
 scoreBar.style.background=s<30?"lime":s<60?"orange":"red";
}

// AI
async function callAI(p){
 if(!API_KEY)return"APIキー未入力";
 let r=await fetch("https://api.openai.com/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer "+API_KEY
  },
  body:JSON.stringify({
   model:"gpt-4o-mini",
   messages:[{role:"user",content:p}]
  })
 });
 let d=await r.json();
 return d.choices?.[0]?.message?.content||"エラー";
}

// 相談
async function analyze(){
 let t=input.value;
 let res=await callAI("感情整理:"+t);
 result.textContent=res;
 saveLog("相談",t);
}

// チェック
async function check(){
 let t=input.value;
 let s=calcScore(t);
 showScore(s);

 if(s>=60){
  warn.innerHTML="<div class='warn'>⚠ 今は送らない方がいい</div>";
  replyBtn.disabled=true;
  return;
 }

 let pred=await callAI("相手の反応:"+t);
 prediction.textContent=pred;
 replyBtn.disabled=false;
}

// 返信
async function reply(){
 let t=input.value;
 let res=await callAI("返信3案:"+t);
 result.textContent=res;
}

// 伴走
async function coach(mode){
 let logs=getLogs().map(l=>l.text).join("\n");
 let res=await callAI(`長期伴走\n${logs}\n目的:${mode}`);
 coachResult.textContent=res;
}

// 未来予測
async function future(){
 let logs=getLogs().map(l=>l.text).join("\n");
 let res=await callAI(`未来予測\n${logs}`);
 futureResult.textContent=res;
}

// 日記
function saveDiary(){
 saveLog("日記",diaryText.value,parseInt(mood.value));
 diaryText.value="";
 review("day");
}

// 日記一覧
function renderDiary(){
 let logs=getLogs().filter(l=>l.type==="日記");
 diaryList.innerHTML=logs.reverse().map(l=>`
 <div class="card">
 ${new Date(l.date).toLocaleString()}<br>${l.text}
 </div>`).join("");
}

// 振り返り
async function review(type){
 let now=Date.now();
 let range={day:86400000,week:86400000*7,month:86400000*30,year:86400000*365};
 let logs=getLogs().filter(l=>l.mood!==null && now-l.date<range[type]);
 let text=logs.map(l=>l.text).join("\n");
 if(!text){reviewResult.textContent="なし";return;}
 let res=await callAI(`振り返り\n${text}`);
 reviewResult.textContent=res;
}

// グラフ
function drawChart(){
 let logs=getLogs().filter(l=>l.mood!==null);
 if(chart)chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
   labels:logs.map(l=>new Date(l.date).toLocaleDateString()),
   datasets:[{
    data:logs.map(l=>l.mood),
    segment:{
     borderColor:ctx=>{
      let v=ctx.p1.parsed.y;
      if(v==2)return"lime";
      if(v==1)return"yellow";
      return"red";
     }
    }
   }]
  }
 });
}

// 初期
window.onload=function(){
 API_KEY=localStorage.getItem("apiKey")||"";
 key.value=API_KEY;
 drawChart();
 renderDiary();
}
</script>

</body>
</html>
